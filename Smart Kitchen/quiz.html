
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Smart Kitchen — Квіз</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html">Головна</a><a href="pp.html">ПП</a><a href="meat.html">М'ясо</a>
        <a href="quiz.html" class="active">Квіз</a><a href="tips.html">Поради</a><a href="faq.html">FAQ</a><a href="team.html">Команда</a>
    </header>

    <div class="container">
        <h1>Кулінарний Детектив 🕵️‍♂️</h1>
        
        <div id="quizBox" style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; position: relative;">
            
            <div id="timer" style="font-weight: bold; color: red; margin-bottom: 10px;">Час: 0 сек</div>

            <h2 id="question">Готові перевірити свої знання?</h2>
            
            <div id="optionsBox" style="display: flex; flex-direction: column; gap: 10px; margin: 20px 0;">
                </div>

            <button id="actionBtn" class="btn-recipe" onclick="startQuiz()">Почати гру</button>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "Яку частину рослини ми їмо в броколі?", a: ["Корінь", "Квіти", "Листя", "Насіння"], correct: 1 },
            { q: "Що додають у каву по-віденськи?", a: ["Сіль", "Вершки", "Перець", "Лимон"], correct: 1 },
            { q: "Який фрукт називають 'королем фруктів' через запах?", a: ["Манго", "Дуріан", "Ананас", "Папайя"], correct: 1 }
        ];

        let currentQ = 0;
        let timerVal = 0;
        let timerInterval;

        function startQuiz() {
            currentQ = 0;
            timerVal = 0;
            document.getElementById('actionBtn').innerText = "Наступне питання";
            document.getElementById('actionBtn').onclick = nextQuestion;
            
            // Запуск "кривого" таймера
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerVal++;
                document.getElementById('timer').innerText = "Час: " + timerVal + " сек";
                
                // БАГ: Квіз переривається на 10 секунді, хоча ліміту ніде не вказано
                if(timerVal === 10) {
                    alert("Час вийшов! (Баг таймера)");
                    showResult();
                }
            }, 1000);

            loadQuestion();
        }

        function loadQuestion() {
            const data = quizData[currentQ];
            document.getElementById('question').innerText = data.q;
            const oBox = document.getElementById('optionsBox');
            oBox.innerHTML = '';

            // БАГ: Перемішуємо індекси, щоб нумерація була 3, 1, 4, 2
            let buggedIndexes = [2, 0, 3, 1]; 

            buggedIndexes.forEach((bugIdx) => {
                const optionText = data.a[bugIdx];
                const btn = document.createElement('button');
                btn.style.cssText = "padding: 12px; border: 2px solid #66bb6a; border-radius: 8px; background: none; cursor: pointer;";
                
                // Виводимо текст з неправильним номером
                btn.innerText = (bugIdx + 1) + ". " + optionText;
                
                btn.onclick = function() {
                    const buttons = oBox.getElementsByTagName('button');
                    for(let b of buttons) b.style.background = "none";
                    this.style.background = "#e8f5e9";
                };
                oBox.appendChild(btn);
            });
        }

        function nextQuestion() {
            currentQ++;
            if(currentQ < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {

clearInterval(timerInterval);
            document.getElementById('timer').innerText = "";
            document.getElementById('question').innerText = "Квіз завершено!";
            document.getElementById('optionsBox').innerHTML = "Ваш результат зафіксовано в системі (ні).";
            document.getElementById('actionBtn').innerText = "Спробувати ще раз";
            document.getElementById('actionBtn').onclick = () => location.reload();
        }
    </script>
</body>
</html>
